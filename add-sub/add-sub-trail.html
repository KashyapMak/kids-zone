<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Add & Sub Trail — Kids Zone</title>

  <!-- Kid-friendly fonts (CDN allowed, still single file) -->
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Fredoka:wght@400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet" />
  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    /* ---------- THEME TOKENS ---------- */
    :root {
      --primary: #6366f1;   /* fallback */
      --bg: #eef2ff;
      --text: #0f172a;
      --muted: #475569;
      --prog: #22c55e;
      --accent: #f59e0b;
      --card: #ffffff;
      --danger: #ef4444;
      --ok: #16a34a;
      --shadow: 0 10px 25px rgba(0,0,0,.08);
      --radius: 20px;
    }

    .theme-blue {
      --primary:#2563eb; --bg:#eff6ff; --text:#0b1220; --prog:#22c55e; --accent:#f59e0b; --card:#ffffff;
    }
    .theme-pink {
      --primary:#ec4899; --bg:#fdf2f8; --text:#831843; --prog:#db2777; --accent:#fbbf24; --card:#ffffff;
    }
    .theme-space {
      --primary:#7c3aed; --bg:#0b1020; --text:#e5e7eb; --prog:#22d3ee; --accent:#fbbf24; --card:#141a2a;
    }
    .theme-jungle {
      --primary:#059669; --bg:#ecfdf5; --text:#052e1c; --prog:#10b981; --accent:#f59e0b; --card:#ffffff;
    }
    .theme-ocean {
      --primary:#0ea5e9; --bg:#e0f2fe; --text:#06243b; --prog:#22c55e; --accent:#f97316; --card:#ffffff;
    }
    .theme-candy {
      --primary:#f43f5e; --bg:#fff1f2; --text:#7f1d1d; --prog:#34d399; --accent:#fb7185; --card:#ffffff;
    }
    .high-contrast {
      --bg:#000; --text:#fff; --card:#000; --primary:#ffd000; --accent:#00ffff; --prog:#00ff66; --muted:#bbb;
      --shadow: 0 0 0 rgba(0,0,0,0);
    }

    /* ---------- BASE LAYOUT ---------- */
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Baloo 2', 'Fredoka', 'Comic Sans MS', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      transition: background .3s, color .3s;
    }

    header {
      background: var(--card);
      position: sticky; top: 0; z-index: 10;
      border-bottom: 4px solid rgba(0,0,0,.05);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: .5rem;
      padding: .5rem 1rem;
    }
    #brand {
      display: flex; align-items: center; gap: .6rem; font-weight: 800;
    }
    #brand .logo { width: 28px; height: 28px; display: inline-block; }
    #brand h1 { font-size: 1.25rem; margin: 0; letter-spacing: .5px; }

    .header-actions {
      display: flex; align-items: center; gap: .5rem; justify-self: end;
    }
    .icon-btn {
      background: transparent; border: 2px solid var(--primary); color: var(--primary);
      border-radius: 999px; padding: .35rem .6rem; cursor: pointer; font-size: 1rem; font-weight: 700;
    }
    .icon-btn[aria-pressed="true"] { background: var(--primary); color: #fff; }

    .select, select, input[type="number"] {
      font-family: inherit; font-weight: 700; color: var(--text);
      border-radius: 12px; border: 2px solid var(--primary);
      background: #fff; padding: .55rem .7rem;
      outline: none;
    }

    main { display: grid; place-items: center; padding: 20px; }
    .card {
      width: min(960px, 96vw);
      background: var(--card);
      border: 3px solid var(--primary);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.25rem;
    }

    .row { display: flex; flex-wrap: wrap; gap: .75rem; align-items: center; }
    .row > * { flex: none; }
    .grow { flex: 1; }

    .divider { height: 2px; background: linear-gradient(90deg, transparent, var(--primary), transparent); margin: .75rem 0 1rem; }

    .main-btn, .mode-btn {
      cursor: pointer; padding: .75rem 1.1rem; border-radius: 14px; border: 0;
      background: var(--primary); color: #fff; font-weight: 800; letter-spacing: .3px;
      box-shadow: 0 6px 0 rgba(0,0,0,.1);
    }
    .secondary-btn {
      cursor: pointer; padding: .6rem 1rem; border-radius: 12px; border: 2px dashed var(--primary);
      background: transparent; color: var(--primary); font-weight: 800;
    }
    .ghost-btn { background: transparent; border: 0; color: var(--primary); font-weight: 800; cursor: pointer; }

    /* ---------- PROGRESS & INFO ---------- */
    #header-progress {
      grid-column: 1 / -1;
      height: 6px; background: #e2e8f0; border-radius: 999px; overflow: hidden;
      margin-top: .5rem;
    }
    #header-progress > span { display: block; height: 100%; width: 0%; background: linear-gradient(90deg, var(--prog), var(--accent)); transition: width .35s ease; }

    #quiz-info {
      display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
      gap: .5rem; text-align: center; margin: .25rem 0 .75rem;
      font-weight: 800; color: var(--muted);
    }
    #timer-clock {
      font-family: 'Orbitron', monospace; font-size: 1.75rem; color: var(--primary);
    }
    .streak { justify-self: end; }

    /* ---------- QUESTION ---------- */
    #question-wrap { text-align: center; margin: .3rem 0; }
    #question-text { font-size: clamp(2.6rem, 6.8vw, 4.5rem); margin: .3rem 0; line-height: 1.1; }
    #helper-visual { margin: .25rem auto .5rem; width: 100%; max-width: 560px; }
    .number-line { position: relative; height: 56px; margin-top: 8px; }
    .number-line .track {
      position: absolute; top: 26px; left: 8px; right: 8px; height: 4px; background: #cbd5e1; border-radius: 4px;
    }
    .number-line .tick { position: absolute; top: 18px; width: 2px; height: 14px; background: #64748b; }
    .number-line .label { position: absolute; top: 0; transform: translateX(-50%); font-weight: 800; font-size: 0.9rem; color: var(--muted); }
    .number-line .marker { position: absolute; top: 18px; transform: translateX(-50%); width: 10px; height: 10px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 0 3px rgba(245, 158, 11, .25); }

    /* ---------- OPTIONS ---------- */
    .options { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: .6rem; margin-top: .6rem; }
    .option-btn {
      cursor: pointer; padding: .85rem .6rem; font-size: 1.4rem; font-weight: 800;
      background: #fff; border: 3px solid var(--primary); color: var(--text);
      border-radius: 14px; transition: transform .08s ease, background .2s ease, color .2s ease;
    }
    .option-btn:hover { transform: translateY(-2px); background: var(--primary); color: #fff; }
    .option-btn[disabled] { opacity: .55; cursor: not-allowed; }
    .option-btn.correct { background: #10b981; color: #fff; border-color: #10b981; }
    .option-btn.wrong { background: #ef4444; color: #fff; border-color: #ef4444; }

    /* ---------- RESULT ---------- */
    #score-big { font-size: clamp(2rem, 6vw, 3rem); margin: .25rem 0; }
    .badges { display: flex; flex-wrap: wrap; gap: .4rem; margin: .25rem 0 .5rem; }
    .badge {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color:#fff; border-radius: 999px; padding: .35rem .7rem; font-weight: 900; letter-spacing:.3px;
      box-shadow: var(--shadow);
    }
    .review-list {
      margin-top: .6rem; border: 1px dashed var(--primary); border-radius: 12px; padding: .5rem; max-height: 360px; overflow: auto;
    }
    .review-item { display: grid; grid-template-columns: 1fr auto; gap: .5rem; border-bottom: 1px solid #eee; padding: .35rem 0; }
    .review-item:last-child { border-bottom: 0; }

    /* ---------- FOOTER ---------- */
    footer { text-align:center; padding:12px; font-size:.95rem; color:var(--muted) }
    .footer-row { display:flex; gap:.75rem; align-items:center; justify-content:center; flex-wrap:wrap; }
    .footer-sep { opacity:.3; }
    .social-link { display:inline-flex; align-items:center; gap:.4rem; color:var(--primary); text-decoration:none; font-weight:800; }
    .social-link:hover { text-decoration:underline; }
    .icon { width:18px; height:18px; display:inline-block; }

    /* ---------- UTILS ---------- */
    .hidden { display: none !important; }
    .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); border:0; }

    /* Print: show result neatly */
    @media print {
      header, #setup-screen, #quiz-screen, .no-print { display: none !important; }
      body { background:#fff; color:#000; }
      .card { border: 0; box-shadow: none; }
      .review-list { max-height: none; }
    }
  </style>
</head>
<body class="theme-jungle">
  <header>
    <div id="brand" aria-label="Add & Sub Trail">
      <!-- Inline relative logo (SVG leaf) -->
      <svg class="logo" viewBox="0 0 64 64" aria-hidden="true">
        <defs>
          <linearGradient id="leafGrad2" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#34d399"/>
            <stop offset="1" stop-color="#059669"/>
          </linearGradient>
        </defs>
        <path d="M54 10C30 10 14 20 8 40c8-4 16-5 24-2-4 1-8 4-12 9 8-2 14-1 20 2 8-10 14-22 14-39z" fill="url(#leafGrad2)" stroke="#065f46" stroke-width="2" />
        <path d="M12 42c10-8 22-12 36-12" stroke="#064e3b" stroke-width="2" fill="none" />
      </svg>
      <h1>Add & Sub Trail</h1>
    </div>

    <div class="row" style="justify-content:center; gap:.4rem;">
      <label class="sr-only" for="theme">Theme</label>
      <select id="theme" class="select" title="Pick a theme">
        <option value="theme-blue">Blue (Classic)</option>
        <option value="theme-pink">Pink (Classic)</option>
        <option value="theme-space">Space</option>
        <option value="theme-jungle" selected>Jungle</option>
        <option value="theme-ocean">Ocean</option>
        <option value="theme-candy">Candy</option>
      </select>
      <!-- Sound is ON by default -->
      <button id="sound-btn" class="icon-btn" aria-pressed="true" title="Toggle sound">🔊</button>
      <button id="voice-btn" class="icon-btn" aria-pressed="false" title="Read questions aloud">🗣️</button>
      <button id="contrast-btn" class="icon-btn" aria-pressed="false" title="High contrast mode">🌓</button>
    </div>

    <div class="header-actions">
      <button id="help-btn" class="icon-btn" title="Help / Shortcuts">❓</button>
    </div>

    <div id="header-progress"><span></span></div>
  </header>

  <main>
    <!-- ---------- SETUP ---------- -->
    <section id="setup-screen" class="card" aria-label="Setup">
      <h2 style="margin:.2rem 0">Choose Your Challenge 🚀</h2>

      <div class="row" style="margin-top:.25rem">
        <strong>Digits:</strong>
        <label><input type="radio" name="digits" value="1" checked> 1‑digit</label>
        <label><input type="radio" name="digits" value="2"> 2‑digit</label>
        <label><input type="radio" name="digits" value="3"> 3‑digit</label>
        <label><input type="radio" name="digits" value="4"> 4‑digit</label>
      </div>

      <div class="row" style="margin-top:.25rem">
        <strong>Operations:</strong>
        <label><input type="radio" name="ops" value="add" checked> Addition (+)</label>
        <label><input type="radio" name="ops" value="sub"> Subtraction (−)</label>
        <label><input type="radio" name="ops" value="mix"> Mixed (+ / −)</label>
      </div>

      <div class="row" style="margin-top:.25rem">
        <label><input type="checkbox" id="no-negative" checked> <strong>No negative answers</strong> (for subtraction)</label>
        <label><input type="checkbox" id="avoid-carry"> <strong>No carry</strong> (addition)</label>
        <label><input type="checkbox" id="avoid-borrow"> <strong>No borrow</strong> (subtraction)</label>
      </div>

      <div class="row" style="margin-top:.25rem">
        <label for="qty-num"><strong>Questions:</strong></label>
        <input type="number" id="qty-num" min="5" max="50" value="15" style="width:120px">
      </div>

      <div class="row" style="margin-top:.5rem">
        <strong>Mode:</strong>
        <button type="button" id="btn-practice" class="mode-btn" aria-pressed="true">😌 Practice</button>
        <button type="button" id="btn-test" class="mode-btn" aria-pressed="false" style="opacity:.7">⏱️ Test (Timed)</button>

        <div id="timed-controls" class="row hidden" style="align-items:flex-start">
          <div class="row" style="gap:.35rem">
            <label><input type="radio" name="tbtype" value="per-question" checked> Per question</label>
            <label><input type="radio" name="tbtype" value="total"> Total time</label>
          </div>
          <div id="perq-wrap" class="row">
            <label for="per-q-secs">Seconds per Q:</label>
            <input id="per-q-secs" type="number" min="5" max="60" value="10" style="width:100px">
          </div>
          <div id="total-wrap" class="row hidden">
            <label for="total-secs">Total seconds:</label>
            <input id="total-secs" type="number" min="30" max="1800" value="180" style="width:120px">
          </div>
        </div>
      </div>

      <div class="row" style="margin-top:.4rem">
        <label><input type="checkbox" id="show-numberline" checked> <strong>Show number line (small numbers)</strong></label>
        <label><input type="checkbox" id="shuffle-options" checked> <strong>Shuffle options</strong></label>
      </div>

      <div class="divider"></div>

      <div class="row" style="justify-content:space-between">
        <div class="grow">
          <div id="stats" style="font-weight:800; color:var(--muted)"></div>
        </div>
        <button class="secondary-btn" id="reset-progress" title="Reset saved best/last scores">🧹 Reset Progress</button>
        <button class="main-btn" id="start-btn" style="min-width:160px">START TRAIL 🏁</button>
      </div>
    </section>

    <!-- ---------- QUIZ ---------- -->
    <section id="quiz-screen" class="card hidden" aria-label="Quiz" aria-live="polite">
      <div id="quiz-info">
        <div class="streak" id="streak">Streak: 0 🔥</div>
        <div id="timer-clock" aria-live="assertive"></div>
        <div id="q-progress" style="justify-self:end">Question 1/15</div>
      </div>

      <div id="question-wrap">
        <div id="message" style="font-weight:800; color:var(--muted); min-height:1.2em"></div>
        <h2 id="question-text" aria-label="Question">0 + 0</h2>
        <div id="helper-visual"></div>
      </div>

      <div id="options" class="options"></div>

      <div class="row" style="margin-top:.5rem; justify-content:space-between;">
        <button class="ghost-btn no-print" id="read-btn">🔊 Read again (R)</button>
        <div class="row">
          <button class="secondary-btn no-print" id="skip-btn">Skip ↷</button>
          <button class="main-btn no-print" id="next-btn">Next ➜</button>
        </div>
      </div>
    </section>

    <!-- ---------- RESULT ---------- -->
    <section id="result-screen" class="card hidden" aria-label="Results">
      <h2>Trail Complete! 🎉</h2>
      <div id="appraise" style="font-size:1.1rem; font-weight:800; color:var(--muted)"></div>
      <div id="score-big">0 / 0</div>
      <div style="font-weight:800; color:var(--muted)">Time taken: <span id="time-taken">00:00</span></div>
      <div class="badges" id="badges"></div>

      <div class="row" style="gap:.5rem; margin:.25rem 0 .5rem">
        <button class="main-btn no-print" id="play-again">Play Again 🔄</button>
        <button class="secondary-btn no-print" id="print-btn">🖨️ Print / Save PDF</button>
      </div>

      <div id="summary-title" style="font-weight:900; margin-top:.35rem">Questions Summary</div>
      <div id="review-list" class="review-list"></div>
    </section>
  </main>

  <footer class="no-print">
    <div class="footer-row">
      <span>Kid Zone © 2026</span>
      <span class="footer-sep">•</span>
      <a class="social-link" href="https://www.linkedin.com/in/kashyapmakadia/" target="_blank" rel="noopener">
        <!-- LinkedIn icon (inline SVG) -->
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M4.98 3.5C4.98 4.88 3.86 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1s2.48 1.12 2.48 2.5zM0 8h5v16H0V8zm7.5 0h4.8v2.2h.07c.67-1.26 2.32-2.6 4.78-2.6 5.11 0 6.05 3.36 6.05 7.73V24h-5v-7.9c0-1.88-.03-4.3-2.62-4.3-2.62 0-3.02 2.05-3.02 4.16V24h-5V8z"/>
        </svg>
        <span>Kashyap Makadia</span>
      </a>
      <span class="footer-sep">•</span>
      <a class="social-link" href="https://github.com/KashyapMak/kids-zone" target="_blank" rel="noopener">
        <!-- GitHub icon (inline SVG) -->
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">

  <script>
    /* =========================
       State & Configuration
       ========================= */
    const cfg = {
      digits: 1,                 // 1|2|3|4
      opMode: 'add',             // 'add' | 'sub' | 'mix'
      total: 15,
      mode: 'practice',          // 'practice' | 'test'
      timeboxType: 'per-question', // 'per-question' | 'total'
      perQSeconds: 10,
      totalSeconds: 180,
      theme: 'theme-jungle',
      shuffleOptions: true,
      showNumberLine: true,
      noNegative: true,
      avoidCarry: false,
      avoidBorrow: false
    };

    let score = 0, current = 0, questions = [], history = [];
    let isMuted = false /* overridden to ON below */, speakQ = false;
    let timerObj = null, timeLeft = 0, streak = 0, awaitingAnswer = true;
    let startTimeMs = 0, endTimeMs = 0;
    let totalTimerObj = null;

    const $ = sel => document.querySelector(sel);

    /* =========================
       Helpers
       ========================= */
    const randInt = (a,b) => Math.floor(Math.random()* (b - a + 1)) + a;

    const shuffle = arr => {
      for (let i=arr.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]] = [arr[j],arr[i]];
      }
      return arr;
    };

    function fmtTime(s){
      const m = Math.floor(s/60), sec = Math.max(0, Math.floor(s%60));
      return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    }

    function beep(type='ok'){
      if(isMuted) return;
      try {
        const ctx = new (window.AudioContext||window.webkitAudioContext)();
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sine';
        o.frequency.setValueAtTime(type==='ok'? 880: (type==='tick'? 660: 220), ctx.currentTime);
        g.gain.value = 0.0001; g.gain.exponentialRampToValueAtTime(0.2, ctx.currentTime + 0.01);
        o.start();
        g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.15);
        o.stop(ctx.currentTime + 0.16);
      } catch {}
    }

    function say(text){
      if(!speakQ) return;
      if(!('speechSynthesis' in window)) return;
      try {
        const u = new SpeechSynthesisUtterance(text.replace('−',' minus ').replace('+',' plus '));
        u.rate = 0.95; u.pitch = 1.1;
        speechSynthesis.cancel(); speechSynthesis.speak(u);
      } catch {}
    }

    function setTheme(name){
      document.body.classList.remove('theme-blue','theme-pink','theme-space','theme-jungle','theme-ocean','theme-candy','high-contrast');
      document.body.classList.add(name);
      cfg.theme = name;
    }

    function updateSavedStats(){
      const key = `as_${cfg.digits}_${cfg.opMode}_${cfg.mode}_${cfg.timeboxType}`;
      const data = JSON.parse(localStorage.getItem(key) || '{}');
      const text = [
        `Digits: ${cfg.digits} | Op: ${cfg.opMode.toUpperCase()} | ${cfg.mode.toUpperCase()} ${cfg.mode==='test' ? `(${cfg.timeboxType.replace('-',' ')})` : ''}`,
        data.best ? `Best: ${data.best.score}/${data.best.total}` : `Best: —`,
        data.last ? `Last: ${data.last.score}/${data.last.total}` : `Last: —`
      ].join('  •  ');
      $('#stats').textContent = text;
    }

    function saveResult(){
      const key = `as_${cfg.digits}_${cfg.opMode}_${cfg.mode}_${cfg.timeboxType}`;
      const data = JSON.parse(localStorage.getItem(key) || '{}');
      const best = data.best && (data.best.score / data.best.total) >= (score / cfg.total) ? data.best : {score, total: cfg.total, date: Date.now()};
      const last = {score, total: cfg.total, date: Date.now()};
      localStorage.setItem(key, JSON.stringify({best, last}));
    }

    /* =========================
       Generation Utilities
       ========================= */
    function pow10(n){ return Math.pow(10, n); }
    function digitRange(d){ return d===1 ? [1,9] : [pow10(d-1), pow10(d)-1]; }

    function hasCarry(a,b){
      let carry = 0;
      while(a>0 || b>0){
        const da = a%10, db = b%10;
        if (da + db + carry >= 10) return true;
        carry = Math.floor((da+db+carry)/10);
        a = Math.floor(a/10); b = Math.floor(b/10);
      }
      return false;
    }

    function needsBorrow(a,b){
      // true if any digit in b > a (examining right to left)
      while(a>0 || b>0){
        const da = a%10, db = b%10;
        if (db > da) return true;
        a = Math.floor(a/10); b = Math.floor(b/10);
      }
      return false;
    }

    function generatePair(d, op){
      // constraints
      const [minV, maxV] = digitRange(d);
      let tries = 0;
      while(tries < 200){
        tries++;
        let a = randInt(minV, maxV);
        let b = randInt(minV, maxV);

        if(op === 'sub'){
          if (cfg.noNegative && a < b){ const t=a; a=b; b=t; } // enforce non-negative
          if (cfg.avoidBorrow && needsBorrow(a,b)) continue;
          return {a,b,op};
        } else if(op === 'add'){
          if (cfg.avoidCarry && hasCarry(a,b)) continue;
          return {a,b,op};
        }
      }
      // Fallback: safe simple values
      let a = minV, b = Math.min(minV, maxV);
      if (op==='sub' && cfg.noNegative && a<b) [a,b]=[b,a];
      return {a,b,op};
    }

    function smartOptions(correct, a, b, op, doShuffle=true){
      const set = new Set([correct]);
      const near = [
        correct + 1, correct - 1, correct + 2, correct - 2,
        correct + (op==='add'? a : -a),
        correct + (op==='add'? b : -b),
        (op==='add' ? a + (b+1) : a - (b-1)),
        (op==='add' ? a + (b-1) : a - (b+1)),
      ].filter(x => Number.isFinite(x));

      near.forEach(v => { if(v>=0 && set.size<4) set.add(v); });
      while(set.size < 4){
        set.add(correct + randInt(-9,9));
      }
      const arr = Array.from(set).slice(0,4);
      return doShuffle ? shuffle(arr) : arr;
    }

    /* =========================
       Build Questions
       ========================= */
    function generateQuestions(){
      questions = []; history = []; current = 0; score = 0; streak = 0;

      for(let i=0;i<cfg.total;i++){
        const op = (cfg.opMode==='mix') ? (Math.random()<0.5?'add':'sub') : cfg.opMode;
        let {a,b} = generatePair(cfg.digits, op);

        // Gentle progression: shrink b early, grow later
        const p = i / cfg.total;
        if (cfg.digits === 1){
          if (p < 0.33) b = randInt(1,3);
          else if (p < 0.66) b = randInt(2,7);
        }

        if (op==='sub' && cfg.noNegative && a<b) [a,b] = [b,a];

        const ans = (op==='add') ? a + b : a - b;
        const opts = smartOptions(ans, a, b, op, cfg.shuffleOptions);
        questions.push({ a, b, op, ans, opts });
      }
    }

    /* =========================
       UI Flow
       ========================= */
    function toggleTimedControls(show){
      $('#timed-controls').classList.toggle('hidden', !show);
    }

    function setMode(mode){
      cfg.mode = mode;
      const isTest = mode === 'test';
      $('#btn-practice').setAttribute('aria-pressed', String(!isTest));
      $('#btn-test').setAttribute('aria-pressed', String(isTest));
      $('#btn-practice').style.opacity = isTest ? .7 : 1;
      $('#btn-test').style.opacity = isTest ? 1 : .7;
      toggleTimedControls(isTest);
      updateSavedStats();
    }

    function setTimeboxType(val){
      cfg.timeboxType = val;
      const perQ = (val === 'per-question');
      $('#perq-wrap').classList.toggle('hidden', !perQ);
      $('#total-wrap').classList.toggle('hidden', perQ);
      updateSavedStats();
    }

    function startQuiz(){
      // Read setup values
      cfg.digits = Number(document.querySelector('input[name="digits"]:checked').value);
      cfg.opMode = document.querySelector('input[name="ops"]:checked').value;
      cfg.total = Math.min(Math.max(Number($('#qty-num').value)||15, 5), 50);
      cfg.noNegative = $('#no-negative').checked;
      cfg.avoidCarry = $('#avoid-carry').checked;
      cfg.avoidBorrow = $('#avoid-borrow').checked;
      cfg.perQSeconds = Math.min(Math.max(Number($('#per-q-secs').value)||10, 5), 60);
      cfg.totalSeconds = Math.min(Math.max(Number($('#total-secs').value)||180, 30), 1800);
      cfg.showNumberLine = $('#show-numberline').checked;
      cfg.shuffleOptions = $('#shuffle-options').checked;

      generateQuestions();
      $('#setup-screen').classList.add('hidden');
      $('#quiz-screen').classList.remove('hidden');

      startTimeMs = Date.now();
      if (cfg.mode==='test' && cfg.timeboxType==='total'){
        // Start total countdown
        let left = cfg.totalSeconds;
        $('#timer-clock').textContent = fmtTime(left);
        totalTimerObj = setInterval(()=>{
          left--; if (left<=3) beep('tick');
          $('#timer-clock').textContent = fmtTime(left);
          if (left<=0){
            clearInterval(totalTimerObj);
            endQuiz(true);
          }
        }, 1000);
      } else {
        $('#timer-clock').textContent = '';
      }

      renderQuestion();
      updateProgress();
      $('#message').textContent = (cfg.mode === 'practice')
        ? 'Try answering — you can retry if you miss!'
        : (cfg.timeboxType==='per-question' ? 'Answer within the time ⏱️ (per question)' : 'Beat the global timer ⏱️ (total)');
    }

    function updateProgress(){
      $('#q-progress').textContent = `Question ${Math.min(current+1, cfg.total)}/${cfg.total}`;
      $('#streak').textContent = `Streak: ${streak} 🔥`;
      $('#header-progress > span').style.width = `${(current / cfg.total) * 100}%`;
    }

    function renderQuestion(){
      if (current >= cfg.total) return endQuiz();

      const q = questions[current];
      const symbol = (q.op==='add') ? '+' : '−';
      $('#question-text').textContent = `${q.a} ${symbol} ${q.b}`;
      renderNumberLine(q);
      renderOptions(q);
      updateProgress();
      awaitingAnswer = true;

      say(`${q.a} ${symbol} ${q.b} equals what?`);

      // Per-question timer
      clearInterval(timerObj);
      if (cfg.mode === 'test' && cfg.timeboxType==='per-question'){
        timeLeft = cfg.perQSeconds;
        $('#timer-clock').textContent = `00:${timeLeft.toString().padStart(2, '0')}`;
        timerObj = setInterval(() => {
          timeLeft--;
          if(timeLeft<=3) beep('tick');
          $('#timer-clock').textContent = `00:${Math.max(0,timeLeft).toString().padStart(2, '0')}`;
          if(timeLeft<=0){
            clearInterval(timerObj);
            checkAnswer(null, true);
          }
        }, 1000);
      } else if (cfg.mode === 'practice') {
        $('#timer-clock').textContent = '';
      }
    }

    function renderNumberLine(q){
      const hv = $('#helper-visual');
      hv.innerHTML = '';
      if (!cfg.showNumberLine) return;

      // Only show number line if numbers are small
      const values = [q.a, q.b, q.ans];
      const maxVal = Math.max(...values);
      const minVal = Math.min(0, ...values);
      if (maxVal > 30 || minVal < 0) return;

      const maxTick = Math.max(10, maxVal);
      const line = document.createElement('div');
      line.className = 'number-line';
      const track = document.createElement('div');
      track.className = 'track';
      line.appendChild(track);

      for (let t=0; t<=maxTick; t++){
        const pct = (t / maxTick) * 100;
        const tick = document.createElement('div');
        tick.className = 'tick';
        tick.style.left = `calc(${pct}% + 8px)`;
        line.appendChild(tick);

        const lbl = document.createElement('div');
        lbl.className = 'label';
        lbl.style.left = `calc(${pct}% + 8px)`;
        lbl.textContent = t;
        line.appendChild(lbl);
      }

      // Markers
      function placeMarker(value, color){
        const pct = (value / maxTick) * 100;
        const m = document.createElement('div');
        m.className = 'marker';
        m.style.left = `calc(${pct}% + 8px)`;
        m.style.background = color;
        line.appendChild(m);
      }

      placeMarker(q.a, '#10b981'); // green
      if (q.op === 'add') {
        placeMarker(q.a + q.b, '#f59e0b'); // result (orange)
      } else {
        placeMarker(q.a - q.b, '#f59e0b');
      }

      hv.appendChild(line);
    }

    function renderOptions(q){
      const cont = $('#options');
      cont.innerHTML = '';
      q.opts.forEach((val, idx) => {
        const b = document.createElement('button');
        b.className = 'option-btn';
        b.textContent = String(val);
        b.setAttribute('data-val', val);
        b.setAttribute('aria-label', `Option ${idx+1}: ${val}`);
        b.addEventListener('click', () => checkAnswer(val, false, b));
        cont.appendChild(b);
      });
      $('#next-btn').disabled = true;
    }

    function checkAnswer(val, isTimeout=false, btnEl=null){
      if(!awaitingAnswer) return;
      awaitingAnswer = false;

      clearInterval(timerObj);
      const q = questions[current];
      const correct = (val === q.ans);
      const symbol = (q.op==='add') ? '+' : '−';

      history.push({ q: `${q.a} ${symbol} ${q.b}`, ans: q.ans, user: val, timeout: isTimeout });

      if (cfg.mode === 'practice'){
        const opts = [...document.querySelectorAll('.option-btn')];
        opts.forEach(b => b.disabled = true);
        if (correct){
          if(btnEl){ btnEl.classList.add('correct'); }
          score++; streak++;
          setMessage(praise(), 'ok');
          beep('ok');
          setTimeout(() => { current++; renderQuestion(); }, 650);
        } else {
          streak = 0;
          if (btnEl){ btnEl.classList.add('wrong'); }
          setMessage(isTimeout ? '⏰ Time’s up — try another!' : 'Oops! Try again 😊', 'warn');
          beep('bad');
          setTimeout(() => {
            opts.forEach(b => {
              if(!b.classList.contains('wrong')) b.disabled = false;
            });
            awaitingAnswer = true;
          }, 350);
        }
      } else {
        const opts = [...document.querySelectorAll('.option-btn')];
        opts.forEach(b => b.disabled = true);
        if (correct){ score++; streak++; if(btnEl) btnEl.classList.add('correct'); setMessage(praise(), 'ok'); beep('ok'); }
        else { streak = 0; if(btnEl) btnEl.classList.add('wrong'); setMessage(isTimeout ? '⏰ Out of time!' : 'Not this one — keep going!', 'warn'); beep('bad'); }
        $('#next-btn').disabled = false;
      }
      updateProgress();
    }

    function setMessage(text, type='info'){
      const el = $('#message');
      el.style.color = (type==='ok') ? 'var(--ok)' : (type==='warn' ? 'var(--danger)' : 'var(--muted)');
      el.textContent = text;
    }

    function praise(){
      const msgs = [
        'Brilliant!', 'Nice job!', 'You rock!', 'Fantastic!', 'Great work!',
        'Super!', 'Math Hero!', 'Amazing!', 'Yes! Keep it up!'
      ];
      return msgs[randInt(0, msgs.length-1)];
    }

    function endQuiz(forcedByTimer=false){
      if (totalTimerObj){ clearInterval(totalTimerObj); totalTimerObj = null; }

      saveResult();
      endTimeMs = Date.now();

      $('#quiz-screen').classList.add('hidden');
      $('#result-screen').classList.remove('hidden');

      const pct = Math.round((score / cfg.total) * 100);
      $('#score-big').textContent = `${score} / ${cfg.total}  (${pct}%)`;

      const totalTakenSec = Math.max(0, Math.round((endTimeMs - startTimeMs)/1000));
      $('#time-taken').textContent = fmtTime(totalTakenSec);

      let msg = 'Great effort! Keep practicing and you’ll nail it!';
      if (forcedByTimer) msg = 'Time’s up! Awesome try — practice again and you’ll beat the clock! ⏰';
      else if (pct === 100) msg = 'Perfect score! You’re a Trail Champion! 🏆';
      else if (pct >= 80) msg = 'Awesome! You’re almost there! 🌟';
      else if (pct >= 60) msg = 'Good job! Practice a bit more! 💪';
      $('#appraise').textContent = msg;

      const badges = [];
      if (pct === 100) badges.push('🏆 Flawless!');
      if (cfg.mode === 'test') badges.push(cfg.timeboxType==='per-question' ? '⏱️ Per‑Q Master' : '⏱️ Total‑Time Master');
      if (streak >= 5) badges.push(`🔥 Streak ${streak}`);
      if (cfg.opMode==='mix') badges.push('➕➖ Mixed Ops');
      if (cfg.digits >= 3) badges.push('💪 Big Digits');
      $('#badges').innerHTML = badges.map(b=>`<span class="badge">${b}</span>`).join('');

      if (pct >= 80) {
        confetti({ particleCount: 160, spread: 70, origin: { y: 0.6 } });
      }

      const list = $('#review-list');
      list.innerHTML = history.map(h => {
        const ok = (h.user === h.ans);
        const u = (h.user===null) ? '—' : h.user;
        return `
          <div class="review-item">
            <div><strong>${h.q}</strong> = <b>${h.ans}</b></div>
            <div style="font-weight:900; color:${ok?'#16a34a':'#ef4444'}">${ok?'✅':'❌'} ${h.timeout?'⏰':''} ${!ok && u!=='—'?`(You: ${u})`:''}</div>
          </div>
        `;
      }).join('');
    }

    /* =========================
       Events & Controls
       ========================= */
    // Theme
    $('#theme').addEventListener('change', e => setTheme(e.target.value));

    // Sound — ON by default
    isMuted = false;
    $('#sound-btn').addEventListener('click', e=>{
      isMuted = !isMuted;
      e.currentTarget.setAttribute('aria-pressed', String(!isMuted));
      e.currentTarget.textContent = isMuted ? '🔇' : '🔊';
      if(!isMuted) beep('ok');
    });

    // Voice (read aloud)
    $('#voice-btn').addEventListener('click', e=>{
      speakQ = !speakQ;
      e.currentTarget.setAttribute('aria-pressed', String(speakQ));
      e.currentTarget.textContent = speakQ ? '🗣️' : '🤫';
      if(speakQ) say('Voice is on. I will read the question.');
    });
    $('#read-btn').addEventListener('click', ()=> {
      const q = questions[current];
      if (!q) return;
      const symbol = (q.op==='add') ? 'plus' : 'minus';
      say(`${q.a} ${symbol} ${q.b} equals what?`);
    });

    // Contrast
    $('#contrast-btn').addEventListener('click', e=>{
      const on = !document.body.classList.contains('high-contrast');
      document.body.classList.toggle('high-contrast', on);
      e.currentTarget.setAttribute('aria-pressed', String(on));
    });

    // Mode buttons
    $('#btn-practice').addEventListener('click', ()=> setMode('practice'));
    $('#btn-test').addEventListener('click', ()=> setMode('test'));

    // Timebox type radios
    document.querySelectorAll('input[name="tbtype"]').forEach(r=>{
      r.addEventListener('change', e => setTimeboxType(e.target.value));
    });

    // Start
    $('#start-btn').addEventListener('click', startQuiz);

    // Next / Skip
    $('#next-btn').addEventListener('click', ()=>{ current++; renderQuestion(); });
    $('#skip-btn').addEventListener('click', ()=>{
      const q = questions[current];
      if (q) { history.push({ q: `${q.a} ${(q.op==='add')?'+':'−'} ${q.b}`, ans: q.ans, user: null, timeout: false }); streak = 0; }
      current++; renderQuestion();
    });

    // Play again / Print
    $('#play-again').addEventListener('click', ()=> location.reload());
    $('#print-btn').addEventListener('click', ()=> window.print());

    // Reset saved best/last
    $('#reset-progress').addEventListener('click', ()=>{
      const keys = Object.keys(localStorage).filter(k => k.startsWith('as_'));
      keys.forEach(k => localStorage.removeItem(k));
      updateSavedStats();
      alert('Progress reset!');
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', e=>{
      const k = e.key.toLowerCase();
      if (k === 'r') { $('#read-btn').click(); }
      if (['1','2','3','4','5','6'].includes(k)) {
        const idx = Number(k)-1;
        const btn = document.querySelectorAll('.option-btn')[idx];
        if(btn) btn.click();
      }
      if (k === 'n' || e.key === 'Enter'){
        if (!$('#next-btn').disabled) $('#next-btn').click();
      }
      if (k === 's') $('#skip-btn').click();
    });

    // Defaults on first load
    setTheme('theme-jungle');            // Jungle by default
    setMode('practice');                 // Practice default
    setTimeboxType('per-question');      // default timebox type (used only in Test)
    updateSavedStats();

    // Help dialog
    $('#help-btn').addEventListener('click', ()=>{
      alert(
`Shortcuts:
• 1–6 → choose option
• N or Enter → Next (Test mode)
• S → Skip
• R → Read question
• Sound (🔊), Voice (🗣️), High contrast (🌓) toggles in header.

Modes:
• Practice: no timer, retry allowed; total time is still tracked.
• Test: choose Per-question timer or a Total-time countdown.

Options:
• No negative answers (subtraction)
• No carry (addition) / No borrow (subtraction)
• Number line appears for small values.`
      );
    });
  </script>
</body>
</html>
