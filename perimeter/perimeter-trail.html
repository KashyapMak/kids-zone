<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Perimeter Trail — Kids Zone</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Fredoka:wght@400;600;700&family=Orbitron:wght@700&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    :root {
      --primary: #059669;
      --bg: #ecfdf5;
      --text: #052e1c;
      --muted: #475569;
      --prog: #10b981;
      --accent: #f59e0b;
      --card: #ffffff;
      --danger: #ef4444;
      --ok: #16a34a;
      --shadow: 0 10px 25px rgba(0, 0, 0, .08);
      --radius: 20px
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      height: 100%
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Baloo 2', 'Fredoka', 'Comic Sans MS', system-ui, -apple-system, Segoe UI, Roboto, sans-serif
    }

    header {
      background: var(--card);
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 4px solid rgba(0, 0, 0, .05);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: .5rem;
      padding: .5rem 1rem
    }

    #brand {
      display: flex;
      align-items: center;
      gap: .6rem;
      font-weight: 800
    }

    #brand .logo {
      width: 28px;
      height: 28px
    }

    #brand h1 {
      font-size: 1.25rem;
      margin: 0
    }

    .icon-btn {
      background: transparent;
      border: 2px solid var(--primary);
      color: var(--primary);
      border-radius: 999px;
      padding: .35rem .6rem;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700
    }

    .icon-btn[aria-pressed="true"] {
      background: var(--primary);
      color: #fff
    }

    main {
      display: grid;
      place-items: center;
      padding: 20px
    }

    .card {
      width: min(980px, 96vw);
      background: var(--card);
      border: 3px solid var(--primary);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.25rem
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: .75rem;
      align-items: center
    }

    .grow {
      flex: 1
    }

    .select,
    select,
    input[type="number"] {
      font-family: inherit;
      font-weight: 700;
      color: var(--text);
      border-radius: 12px;
      border: 2px solid var(--primary);
      background: #fff;
      padding: .55rem .7rem;
      outline: none
    }

    .main-btn,
    .mode-btn {
      cursor: pointer;
      padding: .75rem 1.1rem;
      border-radius: 14px;
      border: 0;
      background: var(--primary);
      color: #fff;
      font-weight: 800;
      box-shadow: 0 6px 0 rgba(0, 0, 0, .1)
    }

    .secondary-btn {
      cursor: pointer;
      padding: .6rem 1rem;
      border-radius: 12px;
      border: 2px dashed var(--primary);
      background: transparent;
      color: var(--primary);
      font-weight: 800
    }

    .ghost-btn {
      background: transparent;
      border: 0;
      color: var(--primary);
      font-weight: 800;
      cursor: pointer
    }

    .divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      margin: .75rem 0 1rem
    }

    #header-progress {
      grid-column: 1/-1;
      height: 6px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
      margin-top: .5rem
    }

    #header-progress>span {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--prog), var(--accent));
      transition: width .35s
    }

    #quiz-info {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: .5rem;
      text-align: center;
      margin: .25rem 0 .75rem;
      font-weight: 800;
      color: var(--muted)
    }

    #timer-clock {
      font-family: 'Orbitron', monospace;
      font-size: 1.75rem;
      color: var(--primary)
    }

    #question-wrap {
      text-align: center;
      margin: .3rem 0
    }

    #question-text {
      font-size: clamp(1.4rem, 3.8vw, 2rem);
      margin: .25rem 0
    }

    #canvas-wrap {
      display: grid;
      place-items: center;
      margin: .35rem 0
    }

    canvas {
      border: 3px solid var(--primary);
      border-radius: 14px;
      background: #fff;
      box-shadow: var(--shadow)
    }

    .options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: .6rem;
      margin-top: .6rem
    }

    .option-btn {
      cursor: pointer;
      padding: .85rem .6rem;
      font-size: 1.2rem;
      font-weight: 800;
      background: #fff;
      border: 3px solid var(--primary);
      color: var(--text);
      border-radius: 14px;
      transition: transform .08s ease, background .2s ease, color .2s ease
    }

    .option-btn:hover {
      transform: translateY(-2px);
      background: var(--primary);
      color: #fff
    }

    .option-btn[disabled] {
      opacity: .55;
      cursor: not-allowed
    }

    .option-btn.correct {
      background: #10b981;
      color: #fff;
      border-color: #10b981
    }

    .option-btn.wrong {
      background: #ef4444;
      color: #fff;
      border-color: #ef4444
    }

    #score-big {
      font-size: clamp(2rem, 6vw, 3rem);
      margin: .25rem 0
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: .4rem;
      margin: .25rem 0 .5rem
    }

    .badge {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      border-radius: 999px;
      padding: .35rem .7rem;
      font-weight: 900
    }

    .review-list {
      margin-top: .6rem;
      border: 1px dashed var(--primary);
      border-radius: 12px;
      padding: .5rem;
      max-height: 360px;
      overflow: auto
    }

    .review-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: .5rem;
      border-bottom: 1px solid #eee;
      padding: .35rem 0
    }

    .review-item:last-child {
      border-bottom: 0
    }

    /* ---------- FOOTER ---------- */
    footer {
      text-align: center;
      padding: 12px;
      font-size: .95rem;
      color: var(--muted)
    }

    .footer-row {
      display: flex;
      gap: .75rem;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .footer-sep {
      opacity: .3;
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      color: var(--primary);
      text-decoration: none;
      font-weight: 800;
    }

    .social-link:hover {
      text-decoration: underline;
    }

    .icon {
      width: 18px;
      height: 18px;
      display: inline-block;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0
    }

    @media print {

      header,
      #setup-screen,
      #quiz-screen,
      .no-print {
        display: none !important
      }

      body {
        background: #fff;
        color: #000
      }

      .card {
        border: 0;
        box-shadow: none
      }

      .review-list {
        max-height: none
      }
    }
  </style>
</head>

<body>
  <header>
    <div id="brand" aria-label="Perimeter Trail">
      <svg class="logo" viewBox="0 0 64 64" aria-hidden="true">
        <defs>
          <linearGradient id="leafP" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#34d399" />
            <stop offset="1" stop-color="#059669" />
          </linearGradient>
        </defs>
        <path d="M54 10C30 10 14 20 8 40c8-4 16-5 24-2-4 1-8 4-12 9 8-2 14-1 20 2 8-10 14-22 14-39z" fill="url(#leafP)"
          stroke="#065f46" stroke-width="2" />
        <path d="M12 42c10-8 22-12 36-12" stroke="#064e3b" stroke-width="2" fill="none" />
      </svg>
      <h1>Perimeter Trail</h1>
    </div>
    <div class="row" style="justify-content:center;gap:.4rem">
      <button id="sound-btn" class="icon-btn" aria-pressed="true" title="Toggle sound">🔊</button>
      <button id="voice-btn" class="icon-btn" aria-pressed="false" title="Read questions aloud">🗣️</button>
      <button id="contrast-btn" class="icon-btn" aria-pressed="false" title="High contrast mode">🌓</button>
    </div>
    <div class="header-actions"><button id="help-btn" class="icon-btn" title="Help / Shortcuts">❓</button></div>
    <div id="header-progress"><span></span></div>
  </header>

  <main>
    <section id="setup-screen" class="card" aria-label="Setup">
      <h2 style="margin:.2rem 0">Choose Your Trail 🚀</h2>
      <div class="row" style="margin-top:.25rem">
        <strong>Shapes:</strong>
        <label><input type="checkbox" class="shape-cb" value="square" checked> Square</label>
        <label><input type="checkbox" class="shape-cb" value="rectangle" checked> Rectangle</label>
        <label><input type="checkbox" class="shape-cb" value="triangle" checked> Equilateral Triangle</label>
        <label><input type="checkbox" class="shape-cb" value="pentagon" checked> Regular Pentagon</label>
      </div>
      <div class="row" style="margin-top:.25rem">
        <strong>Difficulty:</strong>
        <label><input type="radio" name="digits" value="1" checked> 1‑digit (1–9 cm)</label>
        <label><input type="radio" name="digits" value="2"> 2‑digit (10–30 cm)</label>
      </div>
      <div class="row" style="margin-top:.25rem">
        <label><input type="checkbox" id="show-hint" checked> <strong>Show formula hint</strong></label>
        <label><input type="checkbox" id="shuffle-options" checked> <strong>Shuffle options</strong></label>
      </div>
      <div class="row" style="margin-top:.25rem">
        <label for="qty-num"><strong>Questions:</strong></label>
        <input type="number" id="qty-num" min="5" max="50" value="15" style="width:120px">
      </div>
      <div class="row" style="margin-top:.5rem">
        <strong>Mode:</strong>
        <button type="button" id="btn-practice" class="mode-btn" aria-pressed="true">😌 Practice</button>
        <button type="button" id="btn-test" class="mode-btn" aria-pressed="false" style="opacity:.7">⏱️ Test
          (Timed)</button>
        <div id="timed-controls" class="row" style="align-items:flex-start;display:none">
          <div class="row" style="gap:.35rem">
            <label><input type="radio" name="tbtype" value="per-question" checked> Per question</label>
            <label><input type="radio" name="tbtype" value="total"> Total time</label>
          </div>
          <div id="perq-wrap" class="row"><label for="per-q-secs">Seconds per Q:</label><input id="per-q-secs"
              type="number" min="5" max="60" value="12" style="width:100px"></div>
          <div id="total-wrap" class="row" style="display:none"><label for="total-secs">Total seconds:</label><input
              id="total-secs" type="number" min="30" max="1800" value="240" style="width:120px"></div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="row" style="justify-content:space-between">
        <div class="grow">
          <div id="stats" style="font-weight:800;color:var(--muted)"></div>
        </div>
        <button class="secondary-btn" id="reset-progress" title="Reset saved best/last scores">🧹 Reset
          Progress</button>
        <button class="main-btn" id="start-btn" style="min-width:180px">START TRAIL 🏁</button>
      </div>
    </section>

    <section id="quiz-screen" class="card" aria-label="Quiz" aria-live="polite" style="display:none">
      <div id="quiz-info">
        <div class="streak" id="streak">Streak: 0 🔥</div>
        <div id="timer-clock" aria-live="assertive"></div>
        <div id="q-progress" style="justify-self:end">Question 1/15</div>
      </div>
      <div id="question-wrap">
        <div id="message" style="font-weight:800;color:var(--muted);min-height:1.2em"></div>
        <div id="hint" style="font-weight:800;color:var(--muted);min-height:1.2em"></div>
        <div id="canvas-wrap">
          <canvas id="shapeCanvas" width="520" height="320" aria-label="shape drawing"></canvas>
        </div>
        <div id="question-text">Calculate the perimeter (in cm):</div>
      </div>
      <div id="options" class="options"></div>
      <div class="row" style="margin-top:.6rem;justify-content:space-between">
        <button class="ghost-btn no-print" id="read-btn">🔊 Read again (R)</button>
        <div class="row">
          <button class="secondary-btn no-print" id="skip-btn">Skip ↷</button>
          <button class="main-btn no-print" id="next-btn">Next ➜</button>
        </div>
      </div>
    </section>

    <section id="result-screen" class="card" aria-label="Results" style="display:none">
      <h2>Trail Complete! 🎉</h2>
      <div id="appraise" style="font-size:1.1rem;font-weight:800;color:var(--muted)"></div>
      <div id="score-big">0 / 0</div>
      <div style="font-weight:800;color:var(--muted)">Time taken: <span id="time-taken">00:00</span></div>
      <div class="badges" id="badges"></div>
      <div class="row" style="gap:.5rem;margin:.25rem 0 .5rem">
        <button class="main-btn no-print" id="play-again">Play Again 🔄</button>
        <button class="secondary-btn no-print" id="print-btn">🖨️ Print / Save PDF</button>
      </div>
      <div id="summary-title" style="font-weight:900;margin-top:.35rem">Questions Summary</div>
      <div id="review-list" class="review-list"></div>
    </section>
  </main>

  <footer class="no-print">
    <div class="footer-row">
      <span>Deci‑Frac Trail © 2026</span>
      <span class="footer-sep">•</span>
      <a class="social-link" href="https://www.linkedin.com/in/kashyapmakadia/" target="_blank"
        rel="noopener noreferrer">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor"
            d="M4.98 3.5C4.98 4.88 3.86 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1s2.48 1.12 2.48 2.5zM0 8h5v16H0V8zm7.5 0h4.8v2.2h.07c.67-1.26 2.32-2.6 4.78-2.6 5.11 0 6.05 3.36 6.05 7.73V24h-5v-7.9c0-1.88-.03-4.3-2.62-4.3-2.62 0-3.02 2.05-3.02 4.16V24h-5V8z" />
        </svg>
        <span>Kashyap Makadia</span>
      </a>
      <span class="footer-sep">•</span>
      <a class="social-link" href="https://github.com/KashyapMak/kids-zone" target="_blank" rel="noopener noreferrer">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor"
            d="M12 .5A11.5 11.5 0 0 0 .5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.8-.26.8-.58 0-.29-.01-1.06-.02-2.08-3.2.7-3.88-1.54-3.88-1.54-.52-1.33-1.27-1.68-1.27-1.68-1.04-.71.08-.69.08-.69 1.15.08 1.76 1.18 1.76 1.18 1.02 1.75 2.68 1.25 3.33.96.1-.75.4-1.25.72-1.54-2.56-.29-5.26-1.28-5.26-5.68 0-1.25.45-2.27 1.18-3.07-.12-.29-.51-1.47.11-3.06 0 0 .97-.31 3.17 1.17a11.02 11.02 0 0 1 5.78 0c2.2-1.48 3.17-1.17 3.17-1.17.62 1.59.24 2.77.12 3.06.74.8 1.18 1.82 1.18 3.07 0 4.41-2.7 5.39-5.28 5.67.41.35.77 1.05.77 2.12 0 1.53-.01 2.76-.01 3.14 0 .31.21.68.8.57A11.51 11.51 0 0 0 23.5 12 11.5 11.5 0 0 0 12 .5z" />
        </svg>
        <span>kids-zone</span>
      </a>
    </div>
  </footer>

  <script>
    // ===== State & helpers =====
    const cfg = { shapes: ['square', 'rectangle', 'triangle', 'pentagon'], digits: 1, total: 15, mode: 'practice', timeboxType: 'per-question', perQSeconds: 12, totalSeconds: 240, showHint: true, shuffleOptions: true };
    let score = 0, current = 0, questions = [], history = [], isMuted = false, speakQ = false, timerObj = null, timeLeft = 0, streak = 0, awaitingAnswer = true, startTimeMs = 0, endTimeMs = 0, totalTimerObj = null;
    const $ = s => document.querySelector(s); const ri = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a; const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
    const fmt = t => { const m = Math.floor(t / 60), s = Math.max(0, Math.floor(t % 60)); return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}` };
    function beep(type = 'ok') { if (isMuted) return; try { const c = new (window.AudioContext || window.webkitAudioContext)(); const o = c.createOscillator(), g = c.createGain(); o.connect(g); g.connect(c.destination); o.type = 'sine'; o.frequency.setValueAtTime(type === 'ok' ? 880 : (type === 'tick' ? 660 : 220), c.currentTime); g.gain.value = .0001; g.gain.exponentialRampToValueAtTime(.2, c.currentTime + .01); o.start(); g.gain.exponentialRampToValueAtTime(.0001, c.currentTime + .15); o.stop(c.currentTime + .16); } catch { } }
    function say(t) { if (!speakQ || !('speechSynthesis' in window)) return; try { const u = new SpeechSynthesisUtterance(t); u.rate = .98; u.pitch = 1; speechSynthesis.cancel(); speechSynthesis.speak(u); } catch { } }

    // ===== Canvas drawing with auto-scale-to-fit =====
    const canvas = document.getElementById('shapeCanvas');
    const ctx = canvas.getContext('2d');
    const MARGIN = 28; // px margin inside canvas

    function getScaleForUnits(unitsW, unitsH) {
      const maxW = canvas.width - 1.5 * MARGIN, maxH = canvas.height - 1.5 * MARGIN;
      return Math.max(8, Math.min(maxW / unitsW, maxH / unitsH)); // >=8px per unit so 1–2 cm still visible
    }

    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.lineWidth = 4; ctx.strokeStyle = '#059669'; ctx.fillStyle = '#475569'; ctx.font = 'bold 18px Fredoka'; }

    function drawSquare(side) {
      clearCanvas();
      const s = side; const scale = getScaleForUnits(s, s); const pxSize = s * scale; const x = (canvas.width - pxSize) / 2, y = (canvas.height - pxSize) / 2;
      ctx.strokeRect(x, y, pxSize, pxSize);
      ctx.fillText(`${s} cm`, x + pxSize / 2 - 24, y - 10);
    }

    function drawRectangle(w, h) {
      clearCanvas();
      const scale = getScaleForUnits(w, h); const W = w * scale, H = h * scale; const x = (canvas.width - W) / 2, y = (canvas.height - H) / 2;
      ctx.strokeRect(x, y, W, H);
      ctx.fillText(`${w} cm`, x + W / 2 - 22, y - 10);
      ctx.fillText(`${h} cm`, x - 48, y + H / 2);
    }

    function drawEquilateral(s) {
      clearCanvas();

      // 1. Calculate base/height
      const unitsW = s;
      const unitsH = s * Math.sqrt(3) / 2;

      // 2. Adjust scale: Fit to canvas with 25% size reduction
      const maxW = canvas.width - (2 * MARGIN);
      const maxH = canvas.height - (2 * MARGIN);

      // Scale to fit, then multiply by 0.25 (25%)
      const scale = Math.min(maxW / unitsW, maxH / unitsH) * 0.50;

      const basePx = s * scale;
      const heightPx = unitsH * scale;

      // 3. Center the triangle
      // We adjust the Y center slightly upwards to make room for the label below
      const cx = canvas.width / 2;
      const cy = canvas.height / 2 - (heightPx * 0.1);

      const halfBase = basePx / 2;
      const topX = cx, topY = cy - heightPx / 2;
      const leftX = cx - halfBase, leftY = cy + heightPx / 2;
      const rightX = cx + halfBase, rightY = cy + heightPx / 2;

      // Draw
      ctx.beginPath();
      ctx.moveTo(topX, topY);
      ctx.lineTo(rightX, rightY);
      ctx.lineTo(leftX, leftY);
      ctx.closePath();
      ctx.stroke();

      // 4. Base label (now safely inside canvas)
      ctx.font = "16px Arial";
      ctx.fillText(`${s} cm`, cx - 15, rightY + 20);
    }


    function drawPentagon(s) {
      clearCanvas();
      // Approximate bounding box in units
      const unitsW = s * 1.9, unitsH = s * 1.8;
      const scale = getScaleForUnits(unitsW, unitsH) * 0.7;
      const r = s * scale / (2 * Math.sin(Math.PI / 5));
      const cx = canvas.width / 2, cy = canvas.height / 2 + 2;
      ctx.beginPath();
      for (let i = 0; i < 5; i++) { const a = -Math.PI / 2 + i * 2 * Math.PI / 5; const nx = cx + r * Math.cos(a), ny = cy + r * Math.sin(a); (i === 0) ? ctx.moveTo(nx, ny) : ctx.lineTo(nx, ny); }
      ctx.closePath(); ctx.stroke();
      ctx.fillText(`${s} cm`, cx - 22, cy + r + 24);
    }

    // ===== Question generation (store data, draw later) =====
    function digitsRange(d) { return d === 1 ? [1, 9] : [10, 30]; }

    function buildQuestion() {
      const shape = cfg.shapes[Math.floor(Math.random() * cfg.shapes.length)];
      const [minV, maxV] = digitsRange(cfg.digits);
      let data = {}, answer = 0, hint = '', readText = '';
      if (shape === 'square') {
        const s = ri(minV, maxV); data = { shape, s }; answer = 4 * s; hint = cfg.showHint ? 'Hint: P = 4 × side' : ''; readText = `Square with side ${s} centimeters. What is the perimeter?`;
      } else if (shape === 'rectangle') {
        const w = ri(minV, maxV), h = ri(minV, maxV); data = { shape, w, h }; answer = 2 * (w + h); hint = cfg.showHint ? 'Hint: P = 2 × (L + W)' : ''; readText = `Rectangle with width ${w} centimeters and height ${h} centimeters. What is the perimeter?`;
      } else if (shape === 'triangle') {
        const s = ri(minV, maxV); data = { shape, s }; answer = 3 * s; hint = cfg.showHint ? 'Hint: Equilateral: P = 3 × side' : ''; readText = `Equilateral triangle with side ${s} centimeters. What is the perimeter?`;
      } else if (shape === 'pentagon') {
        const s = ri(minV, maxV); data = { shape, s }; answer = 5 * s; hint = cfg.showHint ? 'Hint: Regular n‑gon: P = n × side (n = 5)' : ''; readText = `Regular pentagon with side ${s} centimeters. What is the perimeter?`;
      }
      const opts = buildOptions(answer, data);
      return { data, answer, opts, hint, readText };
    }

    function buildOptions(correct, data) {
      const set = new Set([correct]); const push = v => { if (v > 0) set.add(v) };
      if (data.shape === 'square') { push(data.s * 3); push(data.s * 2); push(data.s + 4) }
      if (data.shape === 'rectangle') { const { w, h } = data; push(2 * w + h); push(w + 2 * h); push(w + h) }
      if (data.shape === 'triangle') { push(data.s * 2); push(data.s * 4); push(data.s + 3) }
      if (data.shape === 'pentagon') { push(data.s * 4); push(data.s * 6); push(data.s + 5) }
      for (let k = -3; k <= 3; k++) { if (k !== 0) push(correct + k) }
      while (set.size < 4) push(correct + ri(-10, 10));
      const arr = Array.from(set).slice(0, 4); if (cfg.shuffleOptions) shuffle(arr); return arr;
    }

    function generateQuestions() { questions = []; history = []; current = 0; score = 0; streak = 0; for (let i = 0; i < cfg.total; i++) questions.push(buildQuestion()); }

    // ===== UI flow =====
    function updateSavedStats() { const key = `pt_${cfg.digits}_${cfg.mode}_${cfg.timeboxType}_${cfg.shapes.sort().join('')}`; const data = JSON.parse(localStorage.getItem(key) || '{}'); const text = [`Digits:${cfg.digits} | Mode:${cfg.mode.toUpperCase()}${cfg.mode === 'test' ? ` (${cfg.timeboxType.replace('-', ' ')})` : ''}`, data.best ? `Best: ${data.best.score}/${data.best.total}` : `Best: —`, data.last ? `Last: ${data.last.score}/${data.last.total}` : `Last: —`].join('  •  '); $('#stats').textContent = text; }
    function saveResult() { const key = `pt_${cfg.digits}_${cfg.mode}_${cfg.timeboxType}_${cfg.shapes.sort().join('')}`; const data = JSON.parse(localStorage.getItem(key) || '{}'); const best = (data.best && (data.best.score / data.best.total) >= (score / cfg.total)) ? data.best : { score, total: cfg.total, date: Date.now() }; const last = { score, total: cfg.total, date: Date.now() }; localStorage.setItem(key, JSON.stringify({ best, last })); }

    function startQuiz() { cfg.shapes = [...document.querySelectorAll('.shape-cb')].filter(cb => cb.checked).map(cb => cb.value); if (cfg.shapes.length === 0) { alert('Select at least one shape.'); return; } cfg.digits = Number(document.querySelector('input[name="digits"]:checked').value); cfg.total = clamp(Number($('#qty-num').value) || 15, 5, 50); cfg.showHint = $('#show-hint').checked; cfg.shuffleOptions = $('#shuffle-options').checked; cfg.perQSeconds = clamp(Number($('#per-q-secs').value) || 12, 5, 60); cfg.totalSeconds = clamp(Number($('#total-secs').value) || 240, 30, 1800); generateQuestions(); $('#setup-screen').style.display = 'none'; $('#quiz-screen').style.display = 'block'; startTimeMs = Date.now(); if (cfg.mode === 'test' && cfg.timeboxType === 'total') { let left = cfg.totalSeconds; $('#timer-clock').textContent = fmt(left); totalTimerObj = setInterval(() => { left--; if (left <= 3) beep('tick'); $('#timer-clock').textContent = fmt(left); if (left <= 0) { clearInterval(totalTimerObj); endQuiz(true); } }, 1000); } else { $('#timer-clock').textContent = ''; } renderQuestion(); updateProgress(); setMessage(cfg.mode === 'practice' ? 'Try answering — you can retry if you miss!' : (cfg.timeboxType === 'per-question' ? 'Answer within the time ⏱️ (per question)' : 'Beat the global timer ⏱️ (total)')); }

    function updateProgress() { $('#q-progress').textContent = `Question ${Math.min(current + 1, cfg.total)}/${cfg.total}`; $('#streak').textContent = `Streak: ${streak} 🔥`; $('#header-progress > span').style.width = `${(current / cfg.total) * 100}%`; }

    function drawCurrent(q) { const d = q.data; if (d.shape === 'square') drawSquare(d.s); else if (d.shape === 'rectangle') drawRectangle(d.w, d.h); else if (d.shape === 'triangle') drawEquilateral(d.s); else if (d.shape === 'pentagon') drawPentagon(d.s); }

    function renderQuestion() { if (current >= cfg.total) return endQuiz(); const q = questions[current]; $('#hint').textContent = q.hint || ''; $('#question-text').textContent = 'Calculate the perimeter (in cm):'; drawCurrent(q); renderOptions(q); say(q.readText); awaitingAnswer = true; clearInterval(timerObj); if (cfg.mode === 'test' && cfg.timeboxType === 'per-question') { timeLeft = cfg.perQSeconds; $('#timer-clock').textContent = `00:${timeLeft.toString().padStart(2, '0')}`; timerObj = setInterval(() => { timeLeft--; if (timeLeft <= 3) beep('tick'); $('#timer-clock').textContent = `00:${Math.max(0, timeLeft).toString().padStart(2, '0')}`; if (timeLeft <= 0) { clearInterval(timerObj); checkAnswer(null, true); } }, 1000); } else { $('#timer-clock').textContent = ''; } }

    function renderOptions(q) { const cont = $('#options'); cont.innerHTML = ''; q.opts.forEach(v => { const b = document.createElement('button'); b.className = 'option-btn'; b.textContent = `${v} cm`; b.addEventListener('click', () => checkAnswer(v, false, b)); cont.appendChild(b); }); $('#next-btn').disabled = true; }

    function checkAnswer(val, isTimeout = false, btnEl = null) { if (!awaitingAnswer) return; awaitingAnswer = false; clearInterval(timerObj); const q = questions[current]; const correct = (val === q.answer); history.push({ q: summarize(q), ans: `${q.answer} cm`, user: (val === null ? null : `${val} cm`), timeout: isTimeout }); const opts = [...document.querySelectorAll('.option-btn')]; opts.forEach(b => b.disabled = true); if (cfg.mode === 'practice') { if (correct) { if (btnEl) btnEl.classList.add('correct'); score++; streak++; setMessage(praise(), 'ok'); beep('ok'); setTimeout(() => { current++; renderQuestion(); }, 650); } else { streak = 0; if (btnEl) btnEl.classList.add('wrong'); setMessage(isTimeout ? '⏰ Time’s up — try another!' : 'Oops! Try again 😊', 'warn'); beep('bad'); setTimeout(() => { opts.forEach(b => { if (!b.classList.contains('wrong')) b.disabled = false; }); awaitingAnswer = true; }, 350); } } else { if (correct) { if (btnEl) btnEl.classList.add('correct'); score++; streak++; setMessage(praise(), 'ok'); beep('ok'); } else { streak = 0; if (btnEl) btnEl.classList.add('wrong'); setMessage(isTimeout ? '⏰ Out of time!' : 'Not this one — keep going!', 'warn'); beep('bad'); } $('#next-btn').disabled = false; } updateProgress(); }

    function summarize(q) { const d = q.data; switch (d.shape) { case 'square': return `Square (side ${d.s} cm)`; case 'rectangle': return `Rectangle (W ${d.w} cm, H ${d.h} cm)`; case 'triangle': return `Equilateral Triangle (side ${d.s} cm)`; case 'pentagon': return `Regular Pentagon (side ${d.s} cm)`; } }
    function setMessage(t, type = 'info') { const el = $('#message'); el.style.color = (type === 'ok') ? 'var(--ok)' : (type === 'warn' ? 'var(--danger)' : 'var(--muted)'); el.textContent = t; }
    function praise() { const msgs = ['Brilliant!', 'Nice job!', 'You rock!', 'Fantastic!', 'Great work!', 'Super!', 'Math Hero!', 'Amazing!', 'Yes! Keep it up!']; return msgs[ri(0, msgs.length - 1)]; }

    function endQuiz(forced = false) { if (totalTimerObj) { clearInterval(totalTimerObj); totalTimerObj = null; } saveResult(); endTimeMs = Date.now(); $('#quiz-screen').style.display = 'none'; $('#result-screen').style.display = 'block'; const pct = Math.round((score / cfg.total) * 100); $('#score-big').textContent = `${score} / ${cfg.total}  (${pct}%)`; const took = Math.max(0, Math.round((endTimeMs - startTimeMs) / 1000)); $('#time-taken').textContent = fmt(took); let msg = 'Great effort! Keep practicing and you’ll nail it!'; if (forced) msg = 'Time’s up! Awesome try — practice again and you’ll beat the clock! ⏰'; else if (pct === 100) msg = 'Perfect score! You’re a Trail Champion! 🏆'; else if (pct >= 80) msg = 'Awesome! You’re almost there! 🌟'; else if (pct >= 60) msg = 'Good job! Practice a bit more! 💪'; $('#appraise').textContent = msg; const badges = []; if (pct === 100) badges.push('🏆 Flawless!'); if (cfg.mode === 'test') badges.push(cfg.timeboxType === 'per-question' ? '⏱️ Per‑Q Master' : '⏱️ Total‑Time Master'); if (streak >= 5) badges.push(`🔥 Streak ${streak}`); $('#badges').innerHTML = badges.map(b => `<span class='badge'>${b}</span>`).join(''); if (pct >= 80) { confetti({ particleCount: 160, spread: 70, origin: { y: .6 } }) } const list = $('#review-list'); list.innerHTML = history.map(h => { const ok = (h.user !== null && String(h.user) === String(h.ans)); const u = (h.user === null) ? '—' : h.user; return `<div class='review-item'><div><strong>${h.q}</strong> = <b>${h.ans}</b></div><div style='font-weight:900;color:${ok ? '#16a34a' : '#ef4444'}'>${ok ? '✅' : '❌'} ${h.timeout ? '⏰' : ''} ${!ok && u !== '—' ? `(You: ${u})` : ''}</div></div>`; }).join(''); }

    // ===== Controls =====
    $('#sound-btn').addEventListener('click', e => { isMuted = !isMuted; e.currentTarget.setAttribute('aria-pressed', String(!isMuted)); e.currentTarget.textContent = isMuted ? '🔇' : '🔊'; if (!isMuted) beep('ok') });
    $('#voice-btn').addEventListener('click', e => { speakQ = !speakQ; e.currentTarget.setAttribute('aria-pressed', String(speakQ)); e.currentTarget.textContent = speakQ ? '🗣️' : '🤫'; if (speakQ) say('Voice is on. I will read the question.') });
    $('#read-btn').addEventListener('click', () => { const q = questions[current]; if (q) say(q.readText) });
    $('#contrast-btn').addEventListener('click', e => { const on = !document.body.classList.contains('high-contrast'); document.body.classList.toggle('high-contrast', on); e.currentTarget.setAttribute('aria-pressed', String(on)) });
    $('#btn-practice').addEventListener('click', () => { cfg.mode = 'practice'; $('#btn-practice').style.opacity = 1; $('#btn-test').style.opacity = .7; document.getElementById('timed-controls').style.display = 'none'; updateSavedStats() });
    $('#btn-test').addEventListener('click', () => { cfg.mode = 'test'; $('#btn-practice').style.opacity = .7; $('#btn-test').style.opacity = 1; document.getElementById('timed-controls').style.display = 'flex'; updateSavedStats() });
    document.querySelectorAll('input[name="tbtype"]').forEach(r => r.addEventListener('change', e => { cfg.timeboxType = e.target.value; const perQ = (cfg.timeboxType === 'per-question'); document.getElementById('perq-wrap').style.display = perQ ? 'flex' : 'none'; document.getElementById('total-wrap').style.display = perQ ? 'none' : 'flex'; updateSavedStats() }));
    $('#start-btn').addEventListener('click', startQuiz);
    $('#next-btn').addEventListener('click', () => { current++; renderQuestion() });
    $('#skip-btn').addEventListener('click', () => { const q = questions[current]; if (q) { history.push({ q: summarize(q), ans: `${q.answer} cm`, user: null, timeout: false }); streak = 0 } current++; renderQuestion() });
    $('#print-btn').addEventListener('click', () => window.print());
    $('#reset-progress').addEventListener('click', () => { const keys = Object.keys(localStorage).filter(k => k.startsWith('pt_')); keys.forEach(k => localStorage.removeItem(k)); updateSavedStats(); alert('Progress reset!') });
    document.addEventListener('keydown', e => { const k = e.key.toLowerCase(); if (k === 'r') $('#read-btn').click(); if (['1', '2', '3', '4', '5', '6'].includes(k)) { const idx = Number(k) - 1; const btn = document.querySelectorAll('.option-btn')[idx]; if (btn) btn.click() } if (k === 'n' || e.key === 'Enter') { if (!$('#next-btn').disabled) $('#next-btn').click() } if (k === 's') $('#skip-btn').click() });

    function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[arr[i], arr[j]] = [arr[j], arr[i]] } return arr }
    updateSavedStats();
    $('#help-btn').addEventListener('click', () => { alert(`Shortcuts:\n• 1–6 → choose option\n• N or Enter → Next (Test mode)\n• S → Skip\n• R → Read question\n• Sound (🔊), Voice (🗣️), High contrast (🌓) toggles in header.\n\nModes:\n• Practice: no countdown; total time is tracked.\n• Test: Per-question timer or a Total-time countdown.`) });
  </script>
</body>
